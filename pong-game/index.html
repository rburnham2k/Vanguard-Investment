<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pong</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #111;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: Arial, sans-serif;
        }
        .game-wrapper {
            text-align: center;
        }
        canvas {
            background: #000;
            border: 2px solid #ff0;
            display: block;
            margin: 0 auto;
        }
        .scoreboard {
            display: flex;
            justify-content: space-between;
            color: #ff0;
            font-size: 2rem;
            padding: 10px 20px;
        }
        .controls {
            color: #ff0;
            margin-top: 10px;
            font-size: 0.9rem;
        }
        .controls span {
            margin: 0 10px;
        }
        .msg {
            color: #ff0;
            font-size: 1.2rem;
            margin-bottom: 10px;
            min-height: 1.5em;
        }
    </style>
</head>
<body>
<div class="game-wrapper">
    <div class="scoreboard">
        <span id="leftScore">0</span>
        <span id="rightScore">0</span>
    </div>
    <div class="msg" id="msg">Press SPACE to start</div>
    <canvas id="gameCanvas" width="800" height="400"></canvas>
    <div class="controls">
        <span>W/S — Left Paddle</span>
        <span>↑/↓ — Right Paddle</span>
        <span>SPACE — Pause / Resume</span>
    </div>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const leftScoreEl = document.getElementById('leftScore');
    const rightScoreEl = document.getElementById('rightScore');
    const msgEl = document.getElementById('msg');

    const W = 800, H = 400;
    const PADDLE_W = 10, PADDLE_H = 80;
    const BALL_SIZE = 8;
    const SPEED = 4;

    // Game state
    let gameState = 'idle'; // idle | running | paused
    let leftScore = 0, rightScore = 0;

    // Paddles
    const leftPaddle = { x: 20, y: H / 2 - PADDLE_H / 2, w: PADDLE_W, h: PADDLE_H, dy: 0 };
    const rightPaddle = { x: W - 20 - PADDLE_W, y: H / 2 - PADDLE_H / 2, w: PADDLE_W, h: PADDLE_H, dy: 0 };

    // Ball
    const ball = { x: W / 2, y: H / 2, size: BALL_SIZE, dx: SPEED, dy: SPEED };

    // Keys
    const keys = { w: false, s: false, arrowup: false, arrowdown: false };

    function resetBall(direction) {
        ball.x = W / 2;
        ball.y = H / 2;
        ball.dx = direction * SPEED;
        ball.dy = (Math.random() > 0.5 ? 1 : -1) * SPEED;
    }

    function resetGame() {
        leftScore = 0;
        rightScore = 0;
        leftScoreEl.textContent = '0';
        rightScoreEl.textContent = '0';
        leftPaddle.y = H / 2 - PADDLE_H / 2;
        rightPaddle.y = H / 2 - PADDLE_H / 2;
        resetBall(1);
        gameState = 'idle';
        msgEl.textContent = 'Press SPACE to start';
    }

    function update() {
        if (gameState !== 'running') return;

        // Move paddles
        if (keys.w) leftPaddle.dy = -5;
        else if (keys.s) leftPaddle.dy = 5;
        else leftPaddle.dy = 0;

        if (keys.arrowup) rightPaddle.dy = -5;
        else if (keys.arrowdown) rightPaddle.dy = 5;
        else rightPaddle.dy = 0;

        leftPaddle.y += leftPaddle.dy;
        rightPaddle.y += rightPaddle.dy;

        // Clamp paddles
        leftPaddle.y = Math.max(0, Math.min(H - leftPaddle.h, leftPaddle.y));
        rightPaddle.y = Math.max(0, Math.min(H - rightPaddle.h, rightPaddle.y));

        // Move ball
        ball.x += ball.dx;
        ball.y += ball.dy;

        // Ball wall collision (top/bottom)
        if (ball.y - ball.size <= 0 || ball.y + ball.size >= H) {
            ball.dy = -ball.dy;
        }

        // Ball paddle collision
        function rectCollide(bx, by, bw, bh, px, py, pw, ph) {
            return bx - bw / 2 < px + pw &&
                   bx + bw / 2 > px &&
                   by - bh / 2 < py + ph &&
                   by + bh / 2 > py;
        }

        if (rectCollide(ball.x, ball.y, ball.size, ball.size,
                        leftPaddle.x, leftPaddle.y, leftPaddle.w, leftPaddle.h)) {
            ball.dx = Math.abs(ball.dx);
            // Add some angle variation
            ball.dy = (ball.y - (leftPaddle.y + leftPaddle.h / 2)) * 0.2;
        }

        if (rectCollide(ball.x, ball.y, ball.size, ball.size,
                        rightPaddle.x, rightPaddle.y, rightPaddle.w, rightPaddle.h)) {
            ball.dx = -Math.abs(ball.dx);
            ball.dy = (ball.y - (rightPaddle.y + rightPaddle.h / 2)) * 0.2;
        }

        // Scoring
        if (ball.x - ball.size <= 0) {
            rightScore++;
            rightScoreEl.textContent = rightScore;
            resetBall(-1);
        } else if (ball.x + ball.size >= W) {
            leftScore++;
            leftScoreEl.textContent = leftScore;
            resetBall(1);
        }
    }

    function draw() {
        ctx.clearRect(0, 0, W, H);

        // Center line
        ctx.strokeStyle = '#ff0';
        ctx.lineWidth = 2;
        ctx.setLineDash([10, 10]);
        ctx.beginPath();
        ctx.moveTo(W / 2, 0);
        ctx.lineTo(W / 2, H);
        ctx.stroke();
        ctx.setLineDash([]);

        // Paddles
        ctx.fillStyle = '#ff0';
        ctx.fillRect(leftPaddle.x, leftPaddle.y, leftPaddle.w, leftPaddle.h);
        ctx.fillRect(rightPaddle.x, rightPaddle.y, rightPaddle.w, rightPaddle.h);

        // Ball
        ctx.beginPath();
        ctx.arc(ball.x, ball.y, ball.size, 0, Math.PI * 2);
        ctx.fill();
    }

    function loop() {
        update();
        draw();
        requestAnimationFrame(loop);
    }

    // Keyboard
    document.addEventListener('keydown', (e) => {
        const key = e.key.toLowerCase();
        if (key === 'w') keys.w = true;
        if (key === 's') keys.s = true;
        if (key === 'arrowup') keys.arrowup = true;
        if (key === 'arrowdown') keys.arrowdown = true;

        if (e.key === ' ') {
            e.preventDefault();
            if (gameState === 'idle') {
                gameState = 'running';
                msgEl.textContent = '';
            } else if (gameState === 'running') {
                gameState = 'paused';
                msgEl.textContent = 'PAUSED — Press SPACE to resume';
            } else if (gameState === 'paused') {
                gameState = 'running';
                msgEl.textContent = '';
            }
        }
    });

    document.addEventListener('keyup', (e) => {
        const key = e.key.toLowerCase();
        if (key === 'w') keys.w = false;
        if (key === 's') keys.s = false;
        if (key === 'arrowup') keys.arrowup = false;
        if (key === 'arrowdown') keys.arrowdown = false;
    });

    // Start
    resetGame();
    loop();
</script>
</body>
</html>
